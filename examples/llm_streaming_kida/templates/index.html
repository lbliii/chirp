<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kida TemplateStream — LLM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; padding: 1.5rem;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; color: #f8fafc; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input {
      flex: 1; padding: 0.5rem 0.75rem;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 0.375rem; color: #e2e8f0;
    }
    button {
      padding: 0.5rem 1rem; background: #22c55e; color: #0f172a;
      border: none; border-radius: 0.375rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #16a34a; }
    .hint { font-size: 0.8rem; color: #64748b; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Kida TemplateStream</h1>
  <p class="hint">TemplateStream + &#123;% async for %&#125; — O(n), not Fragment-per-token</p>
  <form action="/ask" method="post">
    <input name="prompt" placeholder="Ask something..." value="What is Kida?">
    <button type="submit">Stream</button>
  </form>
</body>
</html>
