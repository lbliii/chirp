{% def column(column_id, column_name, count=0, oob=true) %}
<div class="kanban-column" id="column-{{ column_id }}"{{ ' hx-swap-oob="outerHTML"' if oob else "" }}>
  <div class="kanban-column__header">
    <h3>{{ column_name }}</h3>
    <span class="kanban-column__count">{{ count }}</span>
  </div>
  <div class="kanban-column__body" data-status="{{ column_id }}">
    {% slot %}
  </div>
</div>
{% end %}
