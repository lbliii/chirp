<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; padding: 1.5rem;
    }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: 600; color: #f8fafc; }
    header p { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }
    .feed {
      max-width: 480px; margin: 0 auto;
      background: #1e293b; border-radius: 0.5rem; padding: 1rem;
    }
    .feed h2 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .feed-item {
      padding: 0.5rem 0; border-bottom: 1px solid #334155;
      font-size: 0.9rem;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-item .time { font-size: 0.75rem; color: #22c55e; }
    .back { margin-top: 1rem; text-align: center; }
    .back a { color: #22c55e; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>TemplateStream — Visible Chunks</h1>
    <p>Items arrive every 2 seconds via &#123;% async for %&#125;</p>
  </header>
  {% flush %}
  <section class="feed">
    <h2>Live Feed</h2>
    {% async for item in stream %}
    <div class="feed-item">
      {{ item.title }} <span class="time">{{ item.time }}</span>
    </div>
    {% end %}
  </section>

  <p class="back"><a href="/">← Back</a></p>
</body>
</html>
